user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid       /var/log/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hardening: Prevent DoS by restricting client upload payload limit
    client_max_body_size 50M;

    upstream php-handler {
        server app:9000;
    }

    server {
        listen 80;
        server_name _;

        # Root directory path matching the Nextcloud app path
        root /var/www/html;
        index index.php index.html;

        location / {
            rewrite ^ /index.php$request_uri;
        }

        location ~ ^\/(?:index|remote|public|cron|core\/ajax\/update|status|ocs\/v[12]|updater\.(?:php|ics)|ocs-provider\ Hochs-provider)\.php(?:$|\/) {
            fastcgi_split_path_info ^(.+?\.php)(\/.*)$;
            set $path_info $fastcgi_path_info;
            try_files $fastcgi_script_name =404;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
            fastcgi_param PATH_INFO $path_info;
            fastcgi_param ModPagespeed Off;
            fastcgi_pass php-handler;
        }

        location ~* \.(?:css|js|woff2?|svg|gif|map)$ {
            try_files $uri /index.php$request_uri;
            access_log off;
        }

        location ~* \.(?:png|html|ttf|ico|jpg|jpeg|bcmap)$ {
            try_files $uri /index.php$request_uri;
            access_log off;
        }
    }
}

version: '3.8'

services:
  proxy:
    image: nginx:alpine
    container_name: nextcloud_proxy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nextcloud_data:/var/www/html:ro
    depends_on:
      - app

  app:
    image: nextcloud:fpm-alpine
    container_name: nextcloud_app
    restart: always
    volumes:
      - nextcloud_data:/var/www/html:Z # :Z flag ensures correct SELinux relabeling
    environment:
      - MYSQL_PASSWORD={example_db_user_password}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
    depends_on:
      - db

  db:
    image: mariadb:10.6
    container_name: nextcloud_db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql:Z # :Z flag ensures correct SELinux relabeling
    environment:
      - MYSQL_ROOT_PASSWORD={example_db_root_password}
      - MYSQL_PASSWORD={example_db_user_password}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

volumes:
  nextcloud_data:
  db_data:
